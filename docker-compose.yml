services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: redflag-keycloak-db
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - redflag-network
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: redflag-keycloak
    command:
      - start-dev
      - --db=postgres
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
      - --spi-theme-static-max-age=-1
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KC_HEALTH_ENABLED=true
      - KC_METRICS_ENABLED=true
    depends_on:
      - keycloak-db
    volumes:
      - ./keycloak/themes:/opt/keycloak/themes
    ports:
      - "8080:8080"
    networks:
      - redflag-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redflag-redis
    ports:
      - "6379:6379"
    networks:
      - redflag-network
    restart: unless-stopped

  soketi:
    image: quay.io/soketi/soketi:latest-16-alpine
    container_name: redflag-soketi
    ports:
      - "${SOKETI_PORT:-6001}:6001"
    environment:
      - SOKETI_DEFAULT_APP_USER_AUTHENTICATION=true
      - SOKETI_DEFAULT_APP_ID=${SOKETI_DEFAULT_APP_ID}
      - SOKETI_DEFAULT_APP_KEY=${SOKETI_DEFAULT_APP_KEY}
      - SOKETI_DEFAULT_APP_SECRET=${SOKETI_DEFAULT_APP_SECRET}
    networks:
      - redflag-network
    restart: unless-stopped

  redflag-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redflag-core
    command: [ "node", "dist/apps/core-service/main.js" ]
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Database Configuration
      #- DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/redflag_epic?schema=public}

      # Epic Configuration
      - EPIC_CLIENT_ID=${EPIC_CLIENT_ID}
      - EPIC_USE_SANDBOX=${EPIC_USE_SANDBOX:-true}
      - EPIC_FHIR_BASE_URL=${EPIC_FHIR_BASE_URL}
      - EPIC_TOKEN_URL=${EPIC_TOKEN_URL}
      - EPIC_SCOPE=${EPIC_SCOPE:-system/Patient.read system/Observation.read system/Condition.read system/AllergyIntolerance.read system/MedicationStatement.read system/Procedure.read system/Encounter.read system/DiagnosticReport.read system/Practitioner.read}

      # JWT Backend Service Configuration
      - EPIC_JWT_KEY_ID=${EPIC_JWT_KEY_ID}
      - EPIC_JWT_ISSUER=${EPIC_JWT_ISSUER}
      - EPIC_JWT_SUBJECT=${EPIC_JWT_SUBJECT}
      - EPIC_JWT_AUDIENCE=${EPIC_JWT_AUDIENCE}

      # JWT Private Key (can be file path or inline)
      - EPIC_JWT_PRIVATE_KEY_PATH=${EPIC_JWT_PRIVATE_KEY_PATH}
      - EPIC_JWT_PRIVATE_KEY=${EPIC_JWT_PRIVATE_KEY}

      # Application Configuration
      - PORT=${PORT:-3000}
      - NODE_ENV=${NODE_ENV:-production}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3002}
      - PUSHER_CLUSTER=${PUSHER_CLUSTER}

    depends_on:
      - redis

    restart: unless-stopped
    networks:
      - redflag-network

  redflag-identity:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redflag-identity
    command: [ "node", "dist/apps/identity-service/main.js" ]
    env_file:
      - .env
    ports:
      - "3001:3000"
    environment:
      # Application Configuration
      - PORT=3000
      - NODE_ENV=production
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3002}
    restart: unless-stopped
    networks:
      - redflag-network

networks:
  redflag-network:
    driver: bridge

volumes:
  keycloak-db-data:
