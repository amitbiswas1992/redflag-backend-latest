services:
  postgres:
    image: postgres:16-alpine
    container_name: redflag-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-redflag_epic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - redflag-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redflag-epic:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redflag-epic
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database Configuration
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/redflag_epic?schema=public}

      # Epic Configuration
      - EPIC_CLIENT_ID=${EPIC_CLIENT_ID}
      - EPIC_USE_SANDBOX=${EPIC_USE_SANDBOX:-true}
      - EPIC_FHIR_BASE_URL=${EPIC_FHIR_BASE_URL}
      - EPIC_TOKEN_URL=${EPIC_TOKEN_URL}
      - EPIC_SCOPE=${EPIC_SCOPE:-system/Patient.read system/Observation.read system/Condition.read system/AllergyIntolerance.read system/MedicationStatement.read system/Procedure.read system/Encounter.read system/DiagnosticReport.read system/Practitioner.read}

      # JWT Backend Service Configuration
      - EPIC_JWT_KEY_ID=${EPIC_JWT_KEY_ID}
      - EPIC_JWT_ISSUER=${EPIC_JWT_ISSUER}
      - EPIC_JWT_SUBJECT=${EPIC_JWT_SUBJECT}
      - EPIC_JWT_AUDIENCE=${EPIC_JWT_AUDIENCE}

      # JWT Private Key (can be file path or inline)
      - EPIC_JWT_PRIVATE_KEY_PATH=${EPIC_JWT_PRIVATE_KEY_PATH}
      - EPIC_JWT_PRIVATE_KEY=${EPIC_JWT_PRIVATE_KEY}

      # Application Configuration
      - PORT=${PORT:-3000}
      - NODE_ENV=${NODE_ENV:-production}

    restart: unless-stopped
    networks:
      - redflag-network

volumes:
  postgres_data:
    driver: local

networks:
  redflag-network:
    driver: bridge
